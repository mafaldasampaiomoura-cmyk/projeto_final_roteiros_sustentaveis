<app-navbar></app-navbar>

<section class="routes-page">
  <h1>Explorar Roteiros</h1>
  <p>Lista de roteiros disponíveis</p>

  <p>Total de roteiros: {{ routesList.length }}</p>

  <div class="routes-grid">
    @for (route of routesList; track route.id) {
      <div class="route-card">
        <h2>{{ route.titulo }}</h2>
        <p>{{ route.descricao }}</p>

        <div class="route-meta">
          <span>{{ route.cidade }}</span>
          <span>{{ route.duracao }}</span>
          <span>{{ route.dificuldade }}</span>
        </div>

        <div class="route-actions">
          <a [routerLink]="['/routes', route.id]">Ver detalhe</a>
          <button type="button" (click)="addToFavourites(route.id)">
            ⭐ Favoritar
          </button>
        </div>
      </div>
    }
  </div>
</section>
