<app-navbar></app-navbar>

<section class="create-route-page">
  <div class="create-route-card">
    <h1>Criar roteiro</h1>
    <p>Preenche os dados abaixo para criares um novo roteiro sustentável.</p>

    <form (ngSubmit)="createRoute()">
      <div class="form-group">
        <label for="titulo">Título</label>
        <input
          id="titulo"
          type="text"
          name="titulo"
          [(ngModel)]="route.titulo"
          required
        />
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <textarea
          id="descricao"
          name="descricao"
          [(ngModel)]="route.descricao"
  
        ></textarea>
      </div>

      <div class="form-group">
        <label for="cidade">Cidade</label>
        <input
          id="cidade"
          type="text"
          name="cidade"
          [(ngModel)]="route.cidade"
          required
        />
      </div>

      <div class="form-group">
        <label for="duracao">Duração</label>
        <select
          id="duracao"
          name="duracao"
          [(ngModel)]="route.duracao"
        >
          <option value="">Seleciona uma duração</option>
          <option value="Menos de 1 hora">Menos de 1 hora</option>
          <option value="1 a 2 horas">1 a 2 horas</option>
          <option value="2 a 4 horas">2 a 4 horas</option>
          <option value="Meio Dia">Meio Dia</option>
          <option value="Dia inteiro">Dia inteiro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="dificuldade">Dificuldade</label>
        <select
          id="dificuldade"
          name="dificuldade"
          [(ngModel)]="route.dificuldade"
        >
          <option value="">Seleciona uma opção</option>
          <option value="Fácil">Fácil</option>
          <option value="Média">Média</option>
          <option value="Difícil">Difícil</option>
        </select>
      </div>

      <div class="form-group">
        <label for="categoria">Categoria</label>
        <select
          id="categoria"
          name="categoria"
          [(ngModel)]="route.categoria"
        >
          <option value="">Seleciona uma categoria</option>
          <option value="Cultural">Cultural</option>
          <option value="Natureza">Natureza</option>
          <option value="Gastronomia">Gastronomia</option>
          <option value="Urbano">Urbano</option>
          <option value="Familiar">Familiar</option>
        </select>
      </div>

      <div class="form-group">
        <label for="image_url">Imagem (URL)</label>
        <input
          id="image_url"
          type="text"
          name="image_url"
          [(ngModel)]="route.image_url"
          placeholder="https://..."
        />
      </div>

      <div class="points-section">
        <div class="points-header">
          <h2>Pontos do roteiro</h2>
          <button
            type="button"
            class="secondary-button"
            (click)="addPointField()"
          >
            + Adicionar ponto
          </button>
        </div>

        @for (point of points; track $index) {
          <div class="point-card">
            <div class="point-card-top">
              <h3>Ponto {{ $index + 1 }}</h3>

              @if (points.length > 1) {
                <button
                  type="button"
                  class="remove-button"
                  (click)="removePointField($index)"
                >
                  Remover
                </button>
              }
            </div>

            <div class="form-group">
              <label [for]="'point-name-' + $index">Nome</label>
              <input
                [id]="'point-name-' + $index"
                type="text"
                [name]="'point-name-' + $index"
                [(ngModel)]="point.name"
                required
              />
            </div>

            <div class="form-group">
              <label [for]="'point-descricao-' + $index">Descrição</label>
              <textarea
                [id]="'point-descricao-' + $index"
                [name]="'point-descricao-' + $index"
                [(ngModel)]="point.descricao"
              ></textarea>
            </div>

            <div class="form-group">
              <label [for]="'point-morada-' + $index">
                Nome do local / localização
              </label>
              <input
                [id]="'point-morada-' + $index"
                type="text"
                [name]="'point-morada-' + $index"
                [(ngModel)]="point.morada"
                placeholder="Ex: Sé de Braga, Bom Jesus do Monte, Torre Eiffel"
              />
            </div>
          </div>
        }
      </div>

      <button type="submit">Criar roteiro</button>
    </form>
  </div>
</section>
